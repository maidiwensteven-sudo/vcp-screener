name: Daily VCP Scan

on:
  schedule:
    # 每個交易日美東時間 4:30 PM (UTC 20:30) 自動執行
    - cron: '30 20 * * 1-5'
  workflow_dispatch:
    # 允許在 GitHub 介面手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run VCP screener
        run: python vcp_screener.py --broad --output results/latest.json
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit results
        run: |
          git config user.name "VCP Bot"
          git config user.email "vcp-bot@users.noreply.github.com"
          git add results/latest.json
          git diff --staged --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d')"
          git push
