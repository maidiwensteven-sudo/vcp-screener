name: Daily VCP Scan

on:
  schedule:
    # 台灣時間 09:00 (UTC 01:00)，週二至週六（對應美股週一至週五收盤後）
    - cron: '0 1 * * 2-6'
  workflow_dispatch:
    # 允許在 GitHub 介面手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Run VCP screener
        run: python vcp_screener.py --broad --output results/latest.json
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit results
        run: |
          git config user.name "VCP Bot"
          git config user.email "vcp-bot@users.noreply.github.com"
          git add results/latest.json
          git diff --staged --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d')"
          git push
